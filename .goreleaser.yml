# goreleaser configuration (v2 schema) for the `epos` CLI.
# Docs: https://goreleaser.com
version: 2

project_name: epos

before:
  hooks:
    - go mod tidy

builds:
  - id: epos
    main: ./cmd/epos
    binary: epos
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/gaarutyunov/epos/internal/buildinfo.Version={{ .Version }}
      - -X github.com/gaarutyunov/epos/internal/buildinfo.Commit={{ .FullCommit }}
      - -X github.com/gaarutyunov/epos/internal/buildinfo.Date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows on arm64 is not a target we ship.
      - goos: windows
        goarch: arm64

archives:
  - id: epos
    ids:
      - epos
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE*
      - SPEC.md

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "merge conflict"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

release:
  draft: false
  prerelease: auto
  footer: |
    **Full changelog**: https://github.com/gaarutyunov/epos/compare/{{ .PreviousTag }}...{{ .Tag }}
