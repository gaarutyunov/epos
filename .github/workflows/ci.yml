name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # Fast suite: unit tests + BDD journeys against an in-process OCI registry,
      # real git repositories, and a fake Kubernetes API. No Docker required.
      - name: Unit + BDD (in-process)
        run: go test ./...

      # Full-fidelity suite: the same journeys against real dependencies started
      # via testcontainers-go — zot (OCI), Gitea (git), k3s (cluster). The GitHub
      # runner provides a Docker daemon (SPEC §15.3, §15.6).
      - name: Integration (godog + testcontainers)
        run: go test ./... -tags=integration -timeout 30m

  check-generated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install sysgo
        run: go install github.com/gaarutyunov/sysgo/cmd/sysgo@latest
      # Assert the committed scaffold is in sync with model/epos.sysml
      # (regenerate-and-diff drift check, SPEC §15.6).
      - name: Regenerate and diff
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          make check-generated
